services:
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: compra-certa-api
    ports:
      - "8080:8080"
    env_file:
      - ./apps/api/.env
    depends_on:
      - postgres

  postgres:
    image: postgres:16
    container_name: compra-certa-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: compra
      POSTGRES_PASSWORD: compra123
      POSTGRES_DB: compra_certa
    volumes:
      - compra-certa-pgdata:/var/lib/postgresql/data
      - ./apps/api/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

volumes:
  compra-certa-pgdata:
